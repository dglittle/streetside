project_id = "orlyyjfygshepiwqggpv"

# The admin-action function does its own password check (ADMIN_SECRET), so we
# disable Supabase's JWT gateway verification — otherwise the gateway rejects
# the request before our code runs (the publishable key isn't a JWT).
[functions.admin-action]
verify_jwt = false

# Public donation checkout — no auth (any visitor can start a donation).
[functions.square-checkout]
verify_jwt = false

# Public free-request (0-amount) — no auth; collects shipping + emails seller.
[functions.free-request]
verify_jwt = false
